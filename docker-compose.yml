services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: whatsapp_dashboard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-whatsapp_dashboard}
      POSTGRES_DB: whatsapp_dashboard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whatsapp_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  server-web:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://whatsapp_dashboard:${POSTGRES_PASSWORD:-whatsapp_dashboard}@postgres:5432/whatsapp_dashboard
      REDIS_URL: redis://redis:6379
    volumes:
      - media_data:/repo/apps/server/data/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "node dist/db/migrate.js && node dist/index.js"

  server-worker:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://whatsapp_dashboard:${POSTGRES_PASSWORD:-whatsapp_dashboard}@postgres:5432/whatsapp_dashboard
      REDIS_URL: redis://redis:6379
    volumes:
      - media_data:/repo/apps/server/data/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: node dist/worker.js

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server-web
      - web

volumes:
  postgres_data:
  redis_data:
  media_data:
  caddy_data:
  caddy_config:
